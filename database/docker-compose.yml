version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: hotel_mongodb
    ports:
      - "27017:27017"
    volumes:
      - ./mongo-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      - MONGO_INITDB_DATABASE=hotel_management

networks:
  hotel-network:
    driver: bridge
